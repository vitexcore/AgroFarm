<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Orders UI</title>
<link rel="stylesheet" href="/orders.css">
</head>
<body>
<!-- MAIN PANEL -->


<div class="order-image">
    <img src="saman.png" alt="">
</div>
<div class="panel">
    <div class="title-bar">
        <span class="back">←</span>
        <h1 style="color: white;">Orders</h1>
        <img src="dealer.png" alt="">
    </div>

    <div class="orders">

         <!-- CARD 1 -->
       <div class="order-card">
            <div>
                <img src="orders1.png" class="product">
            </div>
            <div class="info">
                <div class="name">Amal</div>
                <div class="product-name">NPK -15:15:15</div>
                <div class="qty">Quantity -01</div>
            </div>
            <div class="call">
                📞 <span>0774624683</span>
            </div>
        </div>

        <!-- CARD 2 -->
        <div class="order-card">
            <img src="orders2.png" class="product">
            <div class="info">
                <div class="name">Nimal</div>
                <div class="product-name">NPK - 0:19</div>
                <div class="qty">Quantity -04</div>
            </div>
            <div class="call">
                📞 <span>0774624683</span>
            </div>
        </div>

        <!-- CARD 3 -->
        <div class="order-card">
            <img src="orders3.png" class="product">
            <div class="info">
                <div class="name">Kalana</div>
                <div class="product-name">Urea - 10:5</div>
                <div class="qty">Quantity -01</div>
            </div>
            <div class="call">
                📞 <span>0774624683</span>
            </div>
        </div>

        <!-- CARD 4 -->
        <div class="order-card">
            <img src="orders4.png" class="product">
            <div class="info">
                <div class="name">Sarath</div>
                <div class="product-name">Organic - 12:10</div>
                <div class="qty">Quantity -01</div>
            </div>
            <div class="call">
                📞 <span>0774624683</span>
            </div>
        </div>

    </div>
</div>

<!-- BOTTOM NAV -->
 <div class="bottom-images">
        <img src="home.png" alt="">
        <img src="three lines.png" alt="">
        <img src="profile-circle-thin.png" alt="">
        <img src="solar_logout-2-bold.png" alt="">
    </div>

</body>
</html>
